<!DOCTYPE html>
<head>
	<title>slopes</title>
	<link rel = "stylesheet" href = "style/style.css">
</head>

<body>
	<div class = "center">
		<h1>slopes.js</h1>
			<canvas id = "screen" class = "canva" width = "750px" height = "750px"></canvas>
			<div id = "sidebar">
				<div class="sidebar_section">
					<h3>Settings</h3>
					<table>
						<tr><td>points:</td><td><input type = "number" min = "2" max = "14" value = "10" id = "points"></td></tr>
						<tr><td>interval:</td><td>[	<input type = "number" step="0.01" min = "-100" max = "100" value = "0" id = "minimum"> , 
								<input type = "number" step="0.01" min = "-100" max = "100" value = "100" id = "maximum"> ]</td></tr>
						<tr><td><input type = "checkbox" value = "false" id = "writeSlopes">write slopes on lines</td></tr>
						<tr><td><br><button id = "run" class = "buttons">run</button></td></tr>
					</table>
				</div>

				<div class="sidebar_section" id="results">
					<h3>Results</h3>
					<table>
						<tr>
							<td>total slopes:</td><td><input type="text" value="0" readonly id="total"></td>
						</tr>
						<tr>
							<td>non-negative slopes:</td><td><input type="text" value="0" readonly id="nonneg"></td>
						</tr>
						<tr>
							<td>slopes in interval:</td><td><input type="text" value="0" readonly id="interval"></td>
						</tr>
						</tr>
					</table>
				</div>
			</div>
		</div>
	</div>

	<script src = "script/main.js"></script>
</body>
